<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #eee; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #16213e; padding: 2rem 2.5rem; border-radius: 12px; width: 320px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        h1 { font-size: 1.3rem; margin-bottom: 1.5rem; }
        input { width: 100%; padding: 0.6rem; margin-bottom: 1rem; border-radius: 6px; border: 1px solid #333; background: #0f1729; color: #eee; box-sizing: border-box; }
        button { width: 100%; padding: 0.6rem; border-radius: 6px; border: none; background: #5865F2; color: white; font-weight: 600; cursor: pointer; }
        button:hover { background: #4752c4; }
        .error { color: #ff6b6b; margin-bottom: 1rem; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Admin Dashboard Login</h1>
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
        <form method="post" action="/login">
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Log In</button>
        </form>
    </div>
</body>
</html>
